<!doctype html>
<html>
  <head>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      #plugin-root {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      body {
        display: block;
        background: var(--figma-color-bg, #fff);
        color: var(--figma-color-text, #1a1a1a);
        font-family: var(--font-family, Inter, sans-serif);
        font-size: 11px;
      }

      .search-row {
        padding: var(--spacer-2, 8px) var(--spacer-3, 12px);
        border-bottom: 1px solid var(--figma-color-border, #e5e5e5);
      }
      .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      #search-input {
        width: 100%;
        height: 28px;
        padding: 0 40px 0 0;
        border: none;
        background: var(--figma-color-bg, #fff);
        color: var(--figma-color-text, #1a1a1a);
        font-family: var(--font-family, Inter, sans-serif);
        font-size: 11px;
        outline: none;
        box-sizing: border-box;
      }
      #search-input::placeholder {
        color: var(--figma-color-text-secondary, #aaa);
      }

      #clear-btn {
        position: absolute;
        right: 0;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--figma-color-bg-brand, #0d99ff);
        font-size: 11px;
        font-family: var(--font-family, Inter, sans-serif);
        padding: 0;
        line-height: 1;
        display: none;
        white-space: nowrap;
      }
      #clear-btn:hover {
        opacity: 0.75;
      }

      #results-area {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px 4px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--figma-color-text-secondary, #999);
      }
      .section-clear {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--figma-color-bg-brand, #0d99ff);
        font-size: 11px;
        font-family: var(--font-family, Inter, sans-serif);
        font-weight: 400;
        text-transform: none;
        letter-spacing: 0;
        padding: 0;
      }
      .section-clear:hover {
        opacity: 0.75;
      }

      .result-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 12px;
        cursor: pointer;
        position: relative;
        transition: background 0.1s;
      }
      .result-item::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 66px;
        right: 12px;
        height: 1px;
        background: var(--figma-color-border, #e5e5e5);
      }
      .result-item:last-child::after {
        display: none;
      }
      .result-item:hover {
        background: var(--figma-color-bg-secondary, #f5f5f5);
      }

      .artwork-wrap {
        position: relative;
        width: 40px;
        height: 40px;
        flex-shrink: 0;
      }
      .artwork {
        width: 40px;
        height: 40px;
        border-radius: 4px;
        object-fit: cover;
        background: var(--figma-color-bg-secondary, #f0f0f0);
        display: block;
      }
      .color-dot {
        position: absolute;
        bottom: -2px;
        right: -2px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        border: 1.5px solid var(--figma-color-bg, #fff);
      }

      .track-info {
        flex: 1;
        min-width: 0;
      }
      .track-name {
        font-weight: 600;
        color: var(--figma-color-text, #1a1a1a);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .artist-name {
        color: var(--figma-color-text-secondary, #777);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }

      .empty-state,
      .loading {
        padding: 16px 12px;
        color: var(--figma-color-text-secondary, #888);
        text-align: center;
      }

      .spinner-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--figma-color-border, #e5e5e5);
        border-top-color: var(--figma-color-text-secondary, #999);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      fig-footer {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        height: 40px;
        padding: 0 var(--spacer-3, 12px);
        border-top: 1px solid var(--figma-color-border, #e5e5e5);
      }
      #status-label {
        color: var(--figma-color-text-secondary, #777);
        font-size: 11px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="plugin-root">
      <div class="search-row">
        <div class="input-wrap">
          <input type="text" id="search-input" placeholder="Search artist or song..." />
          <button id="clear-btn">Clear</button>
        </div>
      </div>
      <div id="results-area">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
      <fig-footer>
        <label id="status-label">A new bubble will be added</label>
      </fig-footer>
    </div>
    <!-- BUNDLE -->
  </body>
</html>
